<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NEXO Validation</title>
    <style>
        body {
            background: #0a0a12;
            color: #00e5ff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        pre {
            background: #14141e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0,229,255,0.1);
            max-width: 600px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }
        .error { color: #ff0044; }
        .success { color: #00ff88; }
        .loading { color: #ffa500; }
    </style>
</head>
<body>
    <pre id="output" class="loading">⏳ Validating...</pre>

    <script>
        const output = document.getElementById('output');

        // 🔥 Load keys from keys.json
        async function loadKeys() {
            try {
                const response = await fetch('keys.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('keys.json not found (HTTP ' + response.status + ')');
                }
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    return [data];
                }
                return data;
            } catch (e) {
                console.error('Load error:', e);
                return null;
            }
        }

        // 🔥 Case-insensitive key search
        function findKey(keys, key) {
            const upperKey = key.toUpperCase();
            return keys.find(k => k.key.toUpperCase() === upperKey);
        }

        // 🔥 Main validation function
        async function validateKey(key) {
            const keys = await loadKeys();
            if (!keys) {
                return { valid: false, reason: 'Failed to load keys.json' };
            }

            if (keys.length === 0) {
                return { valid: false, reason: 'No keys in database' };
            }

            // 🔥 Case-insensitive search
            const found = findKey(keys, key);
            if (!found) {
                return { 
                    valid: false, 
                    reason: 'Key not found',
                    available_keys: keys.map(k => k.key)
                };
            }

            if (found.status === 'used') {
                return { valid: false, reason: 'Key already used' };
            }

            const now = new Date();
            const expires = new Date(found.expires);
            
            if (now > expires) {
                found.status = 'expired';
                return { valid: false, reason: 'Key expired' };
            }

            const daysLeft = Math.ceil((expires - now) / (1000 * 60 * 60 * 24));
            return {
                valid: true,
                key: found.key,
                duration: found.duration,
                expires: found.expires,
                days_left: daysLeft,
                status: found.status
            };
        }

        // 🔥 URL se key read karein
        const params = new URLSearchParams(window.location.search);
        const key = params.get('key');

        async function main() {
            if (!key) {
                output.className = 'error';
                output.textContent = '❌ No key provided!\n\nUsage: validate.html?key=NEXO-XXXXX';
                return;
            }

            try {
                const result = await validateKey(key);
                output.className = result.valid ? 'success' : 'error';
                output.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                output.className = 'error';
                output.textContent = '❌ Error: ' + error.message;
            }
        }

        main();
    </script>
</body>
</html>
