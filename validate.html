<script>
// 🔥 SIRF JSON - Koi HTML nahi!
const key = new URLSearchParams(location.search).get('key');

async function loadKeys() {
    try {
        const r = await fetch('keys.json?t=' + Date.now());
        if (!r.ok) throw Error('keys.json not found');
        const d = await r.json();
        return Array.isArray(d) ? d : [d];
    } catch (e) { return null; }
}

async function validateKey(k) {
    const keys = await loadKeys();
    if (!keys) return { valid: false, reason: 'Failed to load keys.json' };
    if (!keys.length) return { valid: false, reason: 'No keys found' };
    
    const found = keys.find(x => x.key.toUpperCase() === k.toUpperCase());
    if (!found) return { valid: false, reason: 'Key not found' };
    if (found.status === 'used') return { valid: false, reason: 'Key already used' };
    
    const now = Date.now();
    const exp = new Date(found.expires).getTime();
    if (now > exp) return { valid: false, reason: 'Key expired' };
    
    return {
        valid: true,
        key: found.key,
        duration: found.duration,
        expires: found.expires,
        days_left: Math.ceil((exp - now) / 86400000)
    };
}

if (key) {
    validateKey(key).then(r => document.write(JSON.stringify(r)))
                    .catch(e => document.write(JSON.stringify({ valid: false, reason: e.message })));
} else {
    document.write(JSON.stringify({ valid: false, reason: 'No key provided' }));
}
</script>
