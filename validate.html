<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NEXO Validation</title>
    <style>
        body {
            background: #0a0a12;
            color: #00e5ff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        pre {
            background: #14141e;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(0,229,255,0.1);
            max-width: 600px;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 14px;
        }
        .error { color: #ff0044; }
        .success { color: #00ff88; }
        .loading { color: #ffa500; }
    </style>
</head>
<body>
    <pre id="output" class="loading">⏳ Loading...</pre>

    <script>
        const output = document.getElementById('output');

        async function loadKeys() {
            try {
                const response = await fetch('keys.json?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('keys.json not found');
                }
                const data = await response.json();
                if (!Array.isArray(data)) return [data];
                return data;
            } catch (e) {
                return null;
            }
        }

        async function validateKey(key) {
            const keys = await loadKeys();
            if (!keys) {
                return { valid: false, reason: 'Failed to load keys.json' };
            }

            if (keys.length === 0) {
                return { valid: false, reason: 'No keys found' };
            }

            const found = keys.find(k => k.key.toUpperCase() === key.toUpperCase());
            if (!found) {
                return { valid: false, reason: 'Key not found' };
            }

            if (found.status === 'used') {
                return { valid: false, reason: 'Key already used' };
            }

            const now = new Date();
            const expires = new Date(found.expires);
            
            if (now > expires) {
                return { valid: false, reason: 'Key expired' };
            }

            const daysLeft = Math.ceil((expires - now) / (1000 * 60 * 60 * 24));
            return {
                valid: true,
                key: found.key,
                duration: found.duration,
                expires: found.expires,
                days_left: daysLeft,
                status: found.status
            };
        }

        const params = new URLSearchParams(window.location.search);
        const key = params.get('key');

        async function main() {
            if (!key) {
                output.className = 'error';
                output.textContent = JSON.stringify({ valid: false, reason: 'No key provided' });
                return;
            }

            try {
                const result = await validateKey(key);
                output.className = result.valid ? 'success' : 'error';
                output.textContent = JSON.stringify(result);
            } catch (error) {
                output.className = 'error';
                output.textContent = JSON.stringify({ valid: false, reason: error.message });
            }
        }

        main();
    </script>
</body>
</html>
